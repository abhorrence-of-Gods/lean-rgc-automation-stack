name: CI

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Identity/governance tests intentionally verify first-parent commit
          # topology.  A depth-one checkout cannot prove those obligations.
          fetch-depth: 0
          # Pull requests otherwise default to a synthetic merge commit, which
          # is not the single-parent candidate topology being adjudicated.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Runtime boundary
        run: python scripts/check_runtime_boundary.py
      - name: Dead candidate ledger
        run: python scripts/check_dead_candidate_ledger.py
      - name: Test
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q
